name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "0.11.31"
          python-version: "3.12.13"
          enable-cache: true
      - run: uv sync --frozen --group dev
      - run: uv run ruff check app
      - run: uv run ruff format app --check

  integration-required:
    if: ${{ github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - run: echo "API and affected ML integration checks must be recorded from ops/dev-test.sh --repo ml before merge."
